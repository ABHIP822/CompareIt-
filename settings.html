<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .profile-card { background: white; width: 100%; max-width: 350px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .avatar { width: 80px; height: 80px; background: #1da1f2; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 14px; }
        .label { color: #888; }
        .value { color: #000; font-weight: bold; }
        .logout-btn { background: #ff4d4d; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; margin-top: 25px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar" id="initial">A</div>
        
        <div class="info-row">
            <span class="label">Name</span>
            <span class="value" id="disp-name"></span>
        </div>
        <div class="info-row">
            <span class="label">Age</span>
            <span class="value" id="disp-age"></span>
        </div>
        <div class="info-row">
            <span class="label">Gender</span>
            <span class="value" id="disp-gender"></span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value" id="disp-email"></span>
        </div>

        <button class="logout-btn" onclick="logout()">
            <span>Logout</span>
        </button>
    </div>

    <script>
        // ലോഗിൻ സമയത്ത് നൽകിയ വിവരങ്ങൾ ഇവിടെ കാണിക്കുന്നു
        document.getElementById('disp-name').innerText = localStorage.getItem('userName') || "Not set";
        document.getElementById('disp-age').innerText = localStorage.getItem('userAge') || "Not set";
        document.getElementById('disp-gender').innerText = localStorage.getItem('userGender') || "Not set";
        document.getElementById('disp-email').innerText = localStorage.getItem('userEmail') || "Not set";
        
        // ആദ്യത്തെ അക്ഷരം ലോഗോയിൽ കാണിക്കാൻ
        const name = localStorage.getItem('userName');
        if(name) document.getElementById('initial').innerText = name.charAt(0).toUpperCase();

        function logout() {
            localStorage.clear(); // വിവരങ്ങൾ നീക്കം ചെയ്യുന്നു
            window.location.href = 'login.html'; // തിരികെ ലോഗിൻ പേജിലേക്ക്
        }
    </script>
</body>
</html>
