<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CompareIt</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="settings-header">
        <a href="home.html" class="back-btn">←</a>
        <h1>Profile</h1>
    </header>

    <div class="profile-card">
        <div class="avatar-circle">A</div>

        <div class="info-group">
            <div class="info-row">
                <span class="label">Name</span>
                <span class="value">Abhi</span>
            </div>
            <div class="info-row">
                <span class="label">Age</span>
                <span class="value">18</span>
            </div>
            <div class="info-row">
                <span class="label">Gender</span>
                <span class="value">Male</span>
            </div>
            <div class="info-row">
                <span class="label">Email</span>
                <span class="value email">abhishekp09765@gmail.com</span>
            </div>
            <div class="info-row">
                <span class="label">Weight GL</span>
                <span class="value">Not set</span>
            </div>
        </div>

        <button id="logout-btn" class="logout-button">
            <span> logout</span> Log Out
        </button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
