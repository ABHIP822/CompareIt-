<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<div class="profile-card">
    <div class="avatar-circle" id="initial">?</div>

    <div class="info-group">
        <div class="info-row">
            <span class="label">Name</span>
            <span class="value" id="disp-name">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Age</span>
            <span class="value" id="disp-age">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Gender</span>
            <span class="value" id="disp-gender">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value" id="disp-email">Loading...</span>
        </div>
    </div>

    <button class="logout-button" id="logout-btn">
        <span class="material-symbols-outlined">logout</span>
        Log Out
    </button>
</div>
