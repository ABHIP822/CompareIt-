<button onclick="saveAndGoToProfile()">Create Profile & Sign Up</button>

<script>
function saveAndGoToProfile() {
    const name = document.getElementById('name').value;
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const email = document.getElementById('email').value;

    if(name && email) {
        // വിവരങ്ങൾ താൽക്കാലികമായി സേവ് ചെയ്യുന്നു
        localStorage.setItem('userName', name);
        localStorage.setItem('userAge', age);
        localStorage.setItem('userGender', gender);
        localStorage.setItem('userEmail', email);
        
        // ലോഗിൻ ചെയ്ത ശേഷം പ്രൊഫൈൽ/ഹോം പേജിലേക്ക് പോകുന്നു
        window.location.href = 'profile.html'; 
    } else {
        alert("ദയവായി പേരും ഇമെയിലും നൽകുക");
    }
}
</script>
